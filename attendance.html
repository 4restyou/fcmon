<script>
  // ★ Firebase 초기화
  const firebaseConfig = {
    apiKey: "AIzaSyB23qdSj0wknPB-WfNdoSvhdYRcQkrSYyU",
    authDomain: "fcmon-96ec1.firebaseapp.com",
    projectId: "fcmon-96ec1",
    storageBucket: "fcmon-96ec1.firebasestorage.app",
    messagingSenderId: "912620232254",
    appId: "1:912620232254:web:b86a27fa9f733f2c137b6f"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  /* ═══════════════════════ 🛡 XSS 방어 헬퍼 ═══════════════════════════════════ */
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function safePhotoUrl(url) {
    if (!url) return '';
    const s = String(url).trim();
    if (/^data:image\/(png|jpe?g|gif|webp|svg\+xml);/i.test(s)) return s;
    if (/^https?:\/\//i.test(s)) return s;
    return '';
  }

  function isActiveEntry(entry) {
    return !!entry && entry.active !== false && !entry.canceledAt;
  }
  /* ═════════════════════════════════════════════════════════════════════════════ */

  window.onload = function() {
    loadSettingsRealtime();
    calculateAttendance();
  };

  /* ── 팝업 공지 연동 ── */
  function loadSettingsRealtime() {
    db.collection("settings").doc("system").onSnapshot((doc) => {
      if (doc.exists && doc.data().popup && doc.data().popup.text) {
        const popup = doc.data().popup;
        const now = new Date();
        const exp = popup.expireDate ? new Date(popup.expireDate + 'T23:59:59') : null;
        if (!exp || now <= exp) {
          const key = 'fcmon_popup_' + (popup.createdAt || '').replace(/[^a-zA-Z0-9]/g, '');
          if (localStorage.getItem(key) !== 'dismissed') {
            document.getElementById('popupContent').textContent = popup.text;
            document.getElementById('popupExpire').textContent = popup.expireDate ? '게시 기한: ' + popup.expireDate + '까지' : '';
            document.getElementById('popupOverlay').style.display = 'flex';
            window._popupKey = key;
          }
        }
      }
    }, (err) => { console.error('[settings onSnapshot]', err); });
  }
  function dismissPopup(){ if(window._popupKey) localStorage.setItem(window._popupKey, 'dismissed'); document.getElementById('popupOverlay').style.display='none'; }

  /* ── 출석률 계산 로직 (클라이언트 사이드 조인) ── */
  function calculateAttendance() {
    // 1. 종료된 모든 매치 가져오기
    db.collection("matches").where("status", "==", "매치종료").get().then(snap => {
      const matchDocs = [];
      snap.forEach(doc => { if (!doc.data().deletedAt) matchDocs.push(doc); });
      const totalMatches = matchDocs.length;
      document.getElementById('totalMatchesCount').innerText = totalMatches + ' MATCHES';
      
      if (totalMatches === 0) {
        document.getElementById('attSkeleton').style.display = 'none';
        document.getElementById('attList').innerHTML = '<div class="loading">아직 종료된 매치가 없습니다.</div>';
        return;
      }
      
      let attMap = {};
      let promises = [];
      
      // 2. 각 매치의 참가자(entries) 명단 카운팅
      matchDocs.forEach(doc => {
        promises.push(
          doc.ref.collection("entries").get().then(eSnap => {
            eSnap.forEach(eDoc => {
              const entry = eDoc.data();
              if (!isActiveEntry(entry)) return;
              const uid = entry.userId;
              // 게스트(GUEST-)는 통계에서 제외
              if (uid && !uid.startsWith('GUEST')) {
                 attMap[uid] = (attMap[uid] || 0) + 1;
              }
            });
          })
        );
      });
      
      // 3. 모든 카운팅이 끝나면 유저 정보와 결합
      Promise.all(promises).then(() => {
        db.collection("users").get().then(uSnap => {
          let users = [];
          uSnap.forEach(uDoc => {
            let u = uDoc.data();
            // 탈퇴 회원 제외
            if (u.status === 'retired') return;
            u.id = uDoc.id;
            u.attCount = attMap[u.id] || 0;
            // 총 경기 수가 0이 아닐 때만 비율 계산
            u.attRate = totalMatches > 0 ? Math.round((u.attCount / totalMatches) * 100) : 0;
            users.push(u);
          });
          
          // 출석률(내림차순) -> 출석횟수(내림차순) 정렬
          users.sort((a,b) => {
            if (b.attRate !== a.attRate) return b.attRate - a.attRate;
            return b.attCount - a.attCount;
          });
          
          renderAttendance(users, totalMatches);
        });
      });
    }).catch(err => {
      document.getElementById('attSkeleton').style.display = 'none';
      document.getElementById('attList').innerHTML = '<div class="loading">데이터 로딩 오류: ' + err.message + '</div>';
    });
  }

  function renderAttendance(users, totalMatches) {
    document.getElementById('attSkeleton').style.display = 'none';
    
    if (users.length === 0) {
      document.getElementById('attList').innerHTML = '<div class="loading">등록된 선수가 없습니다.</div>';
      return;
    }

    let html = '';
    users.forEach((p, idx) => {
      const rank = idx + 1;
      const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
      const safeUrl = safePhotoUrl(p.photoUrl);
      const avatar = safeUrl ? '<img src="'+escapeHtml(safeUrl)+'" loading="lazy">' : '<img src="./sublogo2.png" style="padding:6px; object-fit:contain;">';
      
      // 출석률에 따른 게이지 색상 (80%이상 초록, 50%이상 노랑, 미만 빨강)
      let barColor = 'var(--green)';
      if (p.attRate < 50) barColor = '#FF4757';
      else if (p.attRate < 80) barColor = '#FFCA28';

      const safeName = escapeHtml(p.name);
      const safeRate = escapeHtml(p.attRate);
      const safeCount = escapeHtml(p.attCount);

      html += `
        <div class="att-card">
          <div class="att-num ${rankClass}">${rank}</div>
          <div class="att-avatar">${avatar}</div>
          <div class="att-info">
             <div class="att-name">${safeName}</div>
             <div class="att-bar-bg"><div class="att-bar-fill" style="width:0%; background:${barColor};" data-width="${safeRate}%"></div></div>
          </div>
          <div class="att-stats">
             <div class="att-percent" style="color:${barColor}">${safeRate}%</div>
             <div class="att-count">${safeCount} / ${totalMatches}</div>
          </div>
        </div>
      `;
    });
    
    document.getElementById('attList').innerHTML = html;

    // 프로그레스 바 애니메이션 효과 적용 (살짝 딜레이 후 넓어짐)
    setTimeout(() => {
      document.querySelectorAll('.att-bar-fill').forEach(bar => {
        bar.style.width = bar.getAttribute('data-width');
      });
    }, 100);
  }

  function goBack() { window.location.href = 'index.html'; }
</script>

<!-- ═══════════════════════ CSS ═══════════════════════ -->
<style>
  /* 토스트 시스템 - 화면 상단에 순차 표시 */
  #fcm-toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
    width: 100%;
    max-width: 400px;
    padding: 0 16px;
  }
  .fcm-toast {
    background: var(--bg2, #0f1510);
    color: var(--text, #E8F5E9);
    border: 1px solid var(--border, rgba(255,255,255,0.07));
    border-left: 3px solid var(--green, #00E676);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);

  }
  @keyframes fcm-toast-out {

<!-- ═══════════════════════ JS ═══════════════════════ -->
<script>
(function(){
  /* 🔔 토스트 */
  function ensureToastContainer() {
    let c = document.getElementById('fcm-toast-container');
    if (!c) {
      c = document.createElement('div');
      c.id = 'fcm-toast-container';
      document.body.appendChild(c);
    }
    return c;
  }
  
  window.showToast = function(message, type) {
    const container = ensureToastContainer();
    const el = document.createElement('div');
    el.className = 'fcm-toast fcm-toast-' + (type || 'info');
    el.textContent = message;
    container.appendChild(el);
    
    // 자동 제거
    const duration = (type === 'error' || type === 'warning') ? 3800 : 2800;
    setTimeout(function(){
      el.classList.add('is-leaving');
      setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 200);
    }, duration);
  };
  
  /* 🔧 다이얼로그 공통 DOM 구성 */
  function ensureDialogOverlay() {
    let ov = document.getElementById('fcm-dialog-overlay');
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'fcm-dialog-overlay';
      ov.innerHTML = '<div class="fcm-dialog-box">' +
        '<div class="fcm-dialog-title" id="fcm-dialog-title"></div>' +
        '<div class="fcm-dialog-message" id="fcm-dialog-message"></div>' +
        '<input type="text" class="fcm-dialog-input" id="fcm-dialog-input" style="display:none;">' +
        '<div class="fcm-dialog-actions">' +
          '<button type="button" class="fcm-dialog-btn fcm-dialog-btn-cancel" id="fcm-dialog-cancel"></button>' +
          '<button type="button" class="fcm-dialog-btn fcm-dialog-btn-confirm" id="fcm-dialog-confirm"></button>' +
        '</div></div>';
      document.body.appendChild(ov);
    }
    return ov;
  }
  
  let dialogResolver = null;
  
  function closeDialog(result) {
    const ov = document.getElementById('fcm-dialog-overlay');
    if (ov) ov.classList.remove('is-open');
    if (dialogResolver) {
      const r = dialogResolver;
      dialogResolver = null;
      r(result);
    }
  }
  
  /* ✅ showConfirm - Promise<boolean> */
  window.showConfirm = function(message, opts) {
    opts = opts || {};
    const ov = ensureDialogOverlay();
    const titleEl = document.getElementById('fcm-dialog-title');
    const messageEl = document.getElementById('fcm-dialog-message');
    const inputEl = document.getElementById('fcm-dialog-input');
    const cancelBtn = document.getElementById('fcm-dialog-cancel');
    const confirmBtn = document.getElementById('fcm-dialog-confirm');
    
    titleEl.textContent = opts.title || '확인';
    titleEl.classList.toggle('is-danger', !!opts.danger);
    messageEl.textContent = message;
    messageEl.style.display = '';
    inputEl.style.display = 'none';
    
    cancelBtn.textContent = opts.cancelText || '취소';
    cancelBtn.style.display = '';
    confirmBtn.textContent = opts.confirmText || '확인';
    confirmBtn.classList.toggle('is-danger', !!opts.danger);
    
    cancelBtn.onclick = function(){ closeDialog(false); };
    confirmBtn.onclick = function(){ closeDialog(true); };
    
    ov.classList.add('is-open');
    confirmBtn.focus();
    
    return new Promise(function(resolve){ dialogResolver = resolve; });
  };
  
  /* 📝 showPrompt - Promise<string|null> */
  window.showPrompt = function(message, opts) {
    opts = opts || {};
    const ov = ensureDialogOverlay();
    const titleEl = document.getElementById('fcm-dialog-title');
    const messageEl = document.getElementById('fcm-dialog-message');
    const inputEl = document.getElementById('fcm-dialog-input');
    const cancelBtn = document.getElementById('fcm-dialog-cancel');
    const confirmBtn = document.getElementById('fcm-dialog-confirm');
    
    titleEl.textContent = opts.title || '입력';
    titleEl.classList.remove('is-danger');
    messageEl.textContent = message;
    messageEl.style.display = message ? '' : 'none';
    
    inputEl.style.display = '';
    inputEl.type = opts.type || 'text';
    inputEl.placeholder = opts.placeholder || '';
    inputEl.value = opts.defaultValue || '';
    if (opts.maxlength) inputEl.maxLength = opts.maxlength;
    else inputEl.removeAttribute('maxlength');
    if (opts.type === 'number' || (opts.maxlength === 4 && opts.type === 'password')) {
      inputEl.inputMode = 'numeric';
      inputEl.pattern = '[0-9]*';
    } else {
      inputEl.removeAttribute('inputmode');
      inputEl.removeAttribute('pattern');
    }
    
    cancelBtn.textContent = opts.cancelText || '취소';
    cancelBtn.style.display = '';
    confirmBtn.textContent = opts.confirmText || '확인';
    confirmBtn.classList.remove('is-danger');
    
    cancelBtn.onclick = function(){ closeDialog(null); };
    confirmBtn.onclick = function(){ closeDialog(inputEl.value); };
    inputEl.onkeydown = function(e){ 
      if (e.key === 'Enter') { e.preventDefault(); closeDialog(inputEl.value); }
    };
    
    ov.classList.add('is-open');
    setTimeout(function(){ inputEl.focus(); }, 50);
    
    return new Promise(function(resolve){ dialogResolver = resolve; });
  };
  
  /* ⌨️ 전역 키보드 - ESC로 다이얼로그 취소, 배경 클릭으로 취소 */
  document.addEventListener('keydown', function(e){
    const ov = document.getElementById('fcm-dialog-overlay');
    if (!ov || !ov.classList.contains('is-open')) return;
    if (e.key === 'Escape') { closeDialog(null); }
  });
  
  document.addEventListener('click', function(e){
    const ov = document.getElementById('fcm-dialog-overlay');
    if (!ov || !ov.classList.contains('is-open')) return;
    if (e.target === ov) { closeDialog(null); }
  }, true);
})();
</script>

<script>
(function(){
  /* 🔄 showUndoToast - 실행 취소 가능한 토스트 */
  /* 반환값: { commit: () => void, cancel: () => void } */
  /*   commit(): 즉시 완료(토스트 닫고 완료 콜백 실행 안 함) */
  /*   cancel(): 되돌리기 동작 (토스트 닫고 onUndo 콜백 실행) */
  
  window.showUndoToast = function(message, onUndo, opts) {
    opts = opts || {};
    const duration = opts.duration || 5000;
    const label = opts.label || '되돌리기';
    
    // 컨테이너 확보 (showToast와 공유)
    let container = document.getElementById('fcm-toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'fcm-toast-container';
      document.body.appendChild(container);
    }
    
    const toast = document.createElement('div');
    toast.className = 'fcm-toast fcm-toast-success fcm-undo-toast';
    
    const msgEl = document.createElement('div');
    msgEl.className = 'fcm-undo-message';
    msgEl.textContent = message;
    
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'fcm-undo-btn';
    btn.textContent = label;
    
    const progress = document.createElement('div');
    progress.className = 'fcm-undo-progress';
    progress.style.animationDuration = duration + 'ms';
    
    toast.appendChild(msgEl);
    toast.appendChild(btn);
    toast.appendChild(progress);
    container.appendChild(toast);
    
    let settled = false;
    let timeoutId = null;
    
    function dismiss() {
      if (settled) return;
      settled = true;
      if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
      toast.classList.add('is-leaving');
      setTimeout(function(){ if (toast.parentNode) toast.parentNode.removeChild(toast); }, 200);
    }
    
    btn.onclick = function() {
      if (settled) return;
      try { if (onUndo) onUndo(); } 
      catch(e) { console.error('[Undo] 되돌리기 오류:', e); }
      dismiss();
    };
    
    timeoutId = setTimeout(function() {
      // 자동 소멸 - 되돌리기 호출 없이 그냥 토스트 닫힘
      dismiss();
    }, duration);
    
    return {
      commit: function() { dismiss(); },
      cancel: function() { btn.click(); }
    };
  };
})();
</script>
