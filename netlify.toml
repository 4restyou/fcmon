# FCMON — Netlify 배포 설정
# 순수 정적 사이트(빌드 과정 없음). 저장소 루트를 그대로 게시한다.

[build]
  publish = "."
  command = ""

# 기본 보안 헤더 (사이트 동작에는 영향 없음)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# 아이콘/이미지 등 정적 자산 캐시
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML은 항상 최신본을 받도록 캐시 최소화
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
