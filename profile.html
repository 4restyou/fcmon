<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" href="./sublogo2.png">
  <link rel="shortcut icon" href="./sublogo2.png">

  <link rel="apple-touch-icon" href="./sublogo2.png">
  <meta name="apple-mobile-web-app-title" content="FCMON">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCMON - 선수등록 및 마이페이지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./common.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="./app-core.js"></script>

  <style>
    /* 페이지 전용 변수 */
    :root { --border-act: rgba(0,230,118,0.35); }
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 5%,rgba(0,230,118,0.05) 0%,transparent 70%);pointer-events:none;z-index:0}
    .container{max-width:480px;margin:0 auto;padding:0 16px 100px;position:relative;z-index:1}

    .header{display:flex;align-items:center;justify-content:space-between;padding:22px 0 14px}
    .top-logo-img{height:35px;width:auto;object-fit:contain}
    .back-btn{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text)}

    .tabs{display:flex;gap:8px;margin-bottom:22px;background:var(--bg3);padding:5px;border-radius:14px;border:1px solid var(--border)}
    .tab-btn{flex:1;padding:13px 0;border-radius:10px;font-size:13px;font-weight:900;background:transparent;color:var(--muted);border:none;cursor:pointer;transition:.2s;letter-spacing:.3px}
    .tab-btn.active{background:var(--green);color:#000;box-shadow:0 4px 12px rgba(0,230,118,0.2)}
    .view-section{display:none;animation:fadeIn .28s ease}
    .view-section.show{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .form-group{margin-bottom:13px}
    .form-label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
    .form-input{width:100%;min-width:0;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px 15px;color:var(--text);font-family:inherit;font-size:14px;outline:none;box-sizing:border-box;-webkit-appearance:none;appearance:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--border-act)}
    .btn-green{width:100%;height:50px;background:var(--green);color:#000;border:none;border-radius:12px;font-weight:900;font-size:15px;cursor:pointer;transition:opacity .15s}
    .btn-green:active{opacity:.85}
    .btn-green:disabled{opacity:.45;cursor:not-allowed}
    .btn-ghost{width:100%;height:46px;background:transparent;color:var(--muted2);border:1px solid var(--border);border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;margin-top:8px;transition:.2s}
    .btn-ghost:active{border-color:var(--border-act);color:var(--green)}

    .login-card{background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:16px}
    .login-desc{text-align:center;color:var(--muted2);font-size:13px;margin-bottom:20px;line-height:1.6}

    .profile-card{background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:24px;text-align:center;margin-bottom:14px}
    .p-avatar{width:80px;height:80px;border-radius:50%;background:var(--bg2);margin:0 auto 14px;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden}
    .p-avatar img{width:100%;height:100%;object-fit:cover}
    .p-name{font-size:22px;font-weight:900;margin-bottom:6px}
    .p-pos{display:inline-block;background:rgba(255,255,255,0.08);padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;margin-bottom:18px}
    .p-pos.FW{color:#FF4757} .p-pos.MF{color:#2ED573} .p-pos.DF{color:#1E90FF} .p-pos.GK{color:#FFA502}
    .stat-cards{display:flex;gap:10px;margin-bottom:20px}
    .s-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 0;text-align:center}
    .s-title{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-bottom:4px}
    .s-val{font-size:22px;font-weight:900;color:var(--green);font-family:'Bebas Neue',sans-serif}
    .radar-wrap{background:var(--bg2);border-radius:12px;padding:14px;border:1px solid var(--border);margin-bottom:14px}
    .trophy-box{background:var(--bg2);border-radius:12px;padding:16px;border:1px solid var(--border);text-align:left}
    .t-title{font-size:12px;font-weight:700;color:var(--muted2);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase}
    .t-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px}
    .t-row strong{color:var(--gold)}

    .reg-card{background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:14px}
    .load-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:13px}
    .load-row .form-group{flex:1;min-width:0;margin-bottom:0}
    .btn-load{height:46px;padding:0 16px;background:var(--bg2);color:var(--green);border:1px solid var(--border-act);border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0}
    .btn-load:active{background:var(--green-dim)}
    .btn-load:disabled{opacity:.4;cursor:not-allowed}

    .load-status{display:none;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:700;margin-bottom:14px}
    .load-status.success{display:flex;background:var(--green-dim);color:var(--green);border:1px solid rgba(0,230,118,0.2)}
    .load-status.new{display:flex;background:rgba(255,202,40,0.1);color:#FFCA28;border:1px solid rgba(255,202,40,0.2)}

    .photo-upload{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .photo-preview{width:68px;height:68px;border-radius:50%;background:var(--bg2);border:2px dashed rgba(0,230,118,0.3);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;overflow:hidden;flex-shrink:0;transition:border-color .2s}
    .photo-preview:active{border-color:var(--green)}
    .photo-preview img{width:100%;height:100%;object-fit:cover}

    .pos-row{display:flex;gap:8px;margin-bottom:13px}
    .pos-btn{flex:1;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--muted2);font-weight:700;font-size:12px;cursor:pointer;transition:.2s}
    .pos-btn.active-FW{background:rgba(255,71,87,0.12);color:#FF4757;border-color:rgba(255,71,87,0.3)}
    .pos-btn.active-MF{background:rgba(46,213,115,0.12);color:#2ED573;border-color:rgba(46,213,115,0.3)}
    .pos-btn.active-DF{background:rgba(30,144,255,0.12);color:#1E90FF;border-color:rgba(30,144,255,0.3)}
    .pos-btn.active-GK{background:rgba(255,165,2,0.12);color:#FFA502;border-color:rgba(255,165,2,0.3)}

    .ovr-chip{background:var(--green-dim);color:var(--green);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:900}
    .stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:14px 16px}
    .stat-row{display:flex;align-items:center;margin-bottom:11px}
    .stat-row:last-child{margin-bottom:0}
    .stat-name{width:46px;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.3px}
    .stat-slider{flex:1;margin:0 10px;-webkit-appearance:none;background:rgba(255,255,255,0.08);height:5px;border-radius:3px;outline:none;transition:background .3s}
    .stat-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--green);cursor:pointer;box-shadow:0 0 0 3px rgba(0,230,118,0.15)}
    .stat-val{width:24px;font-size:13px;font-weight:700;color:var(--green);text-align:right}

    /* ─── 접기/펼치기 가능한 능력치 섹션 ─── */
    .collapsible-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 13px;
      cursor: pointer;
      user-select: none;
      transition: border-color .2s;
      margin-bottom: 8px;
    }
    .collapsible-trigger:hover { border-color: var(--border-act); }
    .collapsible-trigger.is-open { 
      border-color: var(--border-act); 
      border-bottom-left-radius: 0; 
      border-bottom-right-radius: 0;
      margin-bottom: 0;
    }
    .collapsible-label-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .collapsible-label {
      font-size: 13px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .collapsible-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .collapsible-arrow {
      width: 20px;
      height: 20px;
      color: var(--muted2);
      transition: transform .25s cubic-bezier(0.32, 1, 0.23, 1);
    }
    .collapsible-trigger.is-open .collapsible-arrow {
      transform: rotate(180deg);
      color: var(--green);
    }
    .collapsible-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease;
    }
    .collapsible-body.is-open {
      max-height: 800px; /* 충분히 크게 */
    }
    .collapsible-body .stat-box {
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      border-top: none;
    }

    #popupOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
    .popup-box{background:var(--bg2);width:90%;max-width:400px;border-radius:22px;padding:26px 22px;border:1px solid rgba(0,230,118,0.25);text-align:center;animation:popupIn .3s ease}
    @keyframes popupIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
      </style>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0E1210">
</head>
<body class="has-tabbar">
<div class="container">
  <div class="header">
    <img src="https://lh3.googleusercontent.com/d/1m60UPaw3LHihn8mevOXkost1w0CW67wX" alt="FCMON" class="top-logo-img" loading="eager">
    <div class="back-btn" onclick="goBack()">←</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">내 기록 조회</button>
    <button class="tab-btn" id="tabReg"   onclick="switchTab('reg')">선수 등록 / 수정</button>
  </div>

  <div id="loginView" class="view-section show">
    <div class="login-card" id="loginBox">
      <div class="login-desc">이름과 비밀번호를 입력하면<br>내 스탯과 수상 기록을 확인할 수 있어요.</div>
      
      <!-- 자동 로그인 배너 (세션 있을 때만 노출) -->
      <div id="autoLoginBanner" style="display:none; background: linear-gradient(135deg, rgba(0,230,118,0.12), rgba(0,230,118,0.06)); border: 1px solid rgba(0,230,118,0.35); border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
          <div style="flex:1; min-width:0;">
            <div style="font-size:11px; color:var(--green); font-weight:700; letter-spacing:0.5px; margin-bottom:2px;">✓ 자동 로그인됨</div>
            <div style="font-size:15px; font-weight:900; color:var(--text);" id="autoLoginName">-</div>
          </div>
          <button type="button" onclick="switchToManualLogin()" style="background:transparent; border:1px solid var(--border); color:var(--muted2); padding:6px 12px; border-radius:8px; font-size:11px; cursor:pointer; white-space:nowrap;">
            다른 사람
          </button>
        </div>
      </div>
      
      <!-- 수동 로그인 폼 -->
      <div id="manualLoginForm">
        <div class="form-group"><label class="form-label">이름</label><input type="text" id="l_name" class="form-input" placeholder="등록된 이름"></div>
        <div class="form-group"><label class="form-label">비밀번호</label><input type="password" id="l_pw" class="form-input" placeholder="비밀번호 입력"></div>
        <div style="display:flex; align-items:center; gap:8px; margin:-4px 0 14px; padding:0 2px;">
          <input type="checkbox" id="rememberMe" checked style="width:16px; height:16px; accent-color:var(--green); cursor:pointer;">
          <label for="rememberMe" style="font-size:12px; color:var(--muted2); cursor:pointer; user-select:none;">이 기기에서 로그인 유지 (30일)</label>
        </div>
      </div>
      
      <button class="btn-green" id="loginBtn" onclick="doLogin()">조회하기</button>
    </div>

    <div id="profileBox" style="display:none">
      <div class="profile-card">
        <div class="p-avatar" id="pAvatar">⚽</div>
        <div class="p-name" id="pName">-</div>
        <div class="p-pos" id="pPos">MF</div>
        <div class="stat-cards">
          <div class="s-card"><div class="s-title">OVR</div><div class="s-val" id="pOvr">0</div></div>
          <div class="s-card"><div class="s-title">랭킹 PT</div><div class="s-val" id="pScore" style="color:var(--gold)">0</div></div>
        </div>
        <div class="radar-wrap"><canvas id="radarChart"></canvas></div>
        <div class="trophy-box">
          <div class="t-title">🏆 시즌 수상 기록</div>
          <div class="t-row"><span>🥇 최우수 선수 (MOM)</span><strong id="tMom">0회</strong></div>
          <div class="t-row"><span>🥈 매치 2위</span><strong id="tSec" style="color:silver">0회</strong></div>
          <div class="t-row"><span>🥉 매치 3위</span><strong id="tThird" style="color:#CD7F32">0회</strong></div>
        </div>
      </div>
      <button class="btn-ghost" onclick="goToEditFromProfile()">✏️ 내 정보 수정하기</button>
      <button class="btn-ghost" style="margin-top:6px" onclick="togglePasswordChange()">🔐 비밀번호 변경</button>
      <div id="passwordChangeBox" style="display:none; margin-top:10px; padding:14px; background:var(--bg2); border:1px solid var(--border); border-radius:12px;">
        <div class="form-group"><label class="form-label">현재 비밀번호</label><input type="password" id="pw_current" class="form-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="숫자 4자리"></div>
        <div class="form-group"><label class="form-label">새 비밀번호</label><input type="password" id="pw_new" class="form-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="숫자 4자리"></div>
        <div class="form-group"><label class="form-label">새 비밀번호 확인</label><input type="password" id="pw_confirm" class="form-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="한 번 더 입력"></div>
        <button class="btn-green" id="pwChangeBtn" onclick="updateMyPassword()">변경하기</button>
      </div>
      <button class="btn-ghost" style="margin-top:6px" onclick="resetLoginView()">← 다른 선수 조회</button>
    </div>
  </div>

  <div id="regView" class="view-section">
    <div class="reg-card">
      <div class="form-group"><label class="form-label">이름</label><input type="text" id="r_name" class="form-input" placeholder="이름 입력 (예: 홍길동)"></div>
      <div class="load-row">
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" id="r_pw" class="form-input" placeholder="숫자 4자리">
        </div>
        <button class="btn-load" id="loadBtn" onclick="loadExistingData()">불러오기</button>
      </div>
      <div class="load-status" id="loadStatus"></div>
    </div>

    <div class="reg-card">
      <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(this)" style="display:none">
      <div class="photo-upload">
        <div class="photo-preview" id="photoPreview" onclick="document.getElementById('photoInput').click()">📷</div>
        <div style="font-size:12px;color:var(--muted2)"><strong style="color:var(--green)">프로필 사진</strong><br>탭해서 업로드</div>
      </div>

      <div class="form-group">
        <label class="form-label">주 포지션</label>
        <div class="pos-row">
          <button class="pos-btn" id="pos-FW" onclick="setPos('FW')">⚡ FW</button>
          <button class="pos-btn active-MF" id="pos-MF" onclick="setPos('MF')">🎯 MF</button>
          <button class="pos-btn" id="pos-DF" onclick="setPos('DF')">🛡 DF</button>
          <button class="pos-btn" id="pos-GK" onclick="setPos('GK')">🧤 GK</button>
        </div>
      </div>

      <!-- 연락 정보 (선택 입력, 매니저 명부 관리용) -->
      <div class="form-group">
        <label class="form-label">📱 연락처 (선택)</label>
        <input type="tel" id="r_contact" class="form-input" placeholder="010-1234-5678" maxlength="20" autocomplete="tel">
        <div style="font-size:10px;color:var(--muted);margin-top:4px;line-height:1.5;">매니저 명부 관리용으로만 사용됩니다 · 다른 회원에게는 공개되지 않음</div>
      </div>

      <div class="form-group">
        <label class="form-label">📷 Instagram (선택)</label>
        <input type="text" id="r_instagram" class="form-input" placeholder="인스타그램 아이디 (@ 없이)" maxlength="50" autocomplete="username">
      </div>

      <!-- 능력치 자가진단 (접기/펼치기 가능) -->
      <div class="collapsible-trigger" id="statCollapseTrigger" onclick="toggleStatSection()">
        <div class="collapsible-label-group">
          <span class="collapsible-label">능력치 자가진단</span>
        </div>
        <div class="collapsible-right">
          <span class="ovr-chip">OVR <span id="r_ovrTotal">50</span></span>
          <svg class="collapsible-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
      </div>
      <div class="collapsible-body" id="statCollapseBody">
        <div class="stat-box">
          <div class="stat-row"><div class="stat-name">속도</div><input type="range" class="stat-slider" id="s_speed"   min="10" max="99" value="50" oninput="calcOVR()"><div class="stat-val" id="v_speed">50</div></div>
          <div class="stat-row"><div class="stat-name">슈팅</div><input type="range" class="stat-slider" id="s_shoot"   min="10" max="99" value="50" oninput="calcOVR()"><div class="stat-val" id="v_shoot">50</div></div>
          <div class="stat-row"><div class="stat-name">패스</div><input type="range" class="stat-slider" id="s_pass"    min="10" max="99" value="50" oninput="calcOVR()"><div class="stat-val" id="v_pass">50</div></div>
          <div class="stat-row"><div class="stat-name">드리블</div><input type="range" class="stat-slider" id="s_drib"  min="10" max="99" value="50" oninput="calcOVR()"><div class="stat-val" id="v_drib">50</div></div>
          <div class="stat-row"><div class="stat-name">수비</div><input type="range" class="stat-slider" id="s_def"     min="10" max="99" value="50" oninput="calcOVR()"><div class="stat-val" id="v_def">50</div></div>
          <div class="stat-row"><div class="stat-name">피지컬</div><input type="range" class="stat-slider" id="s_phys"  min="10" max="99" value="50" oninput="calcOVR()"><div class="stat-val" id="v_phys">50</div></div>
          <div class="stat-row"><div class="stat-name">체력</div><input type="range" class="stat-slider" id="s_stamina" min="10" max="99" value="50" oninput="calcOVR()"><div class="stat-val" id="v_stamina">50</div></div>
          <div class="stat-row"><div class="stat-name">민첩성</div><input type="range" class="stat-slider" id="s_agility" min="10" max="99" value="50" oninput="calcOVR()"><div class="stat-val" id="v_agility">50</div></div>
        </div>
      </div>
    </div>

    <button class="btn-green" id="regSubmitBtn" onclick="submitReg()">📝 등록 / 수정하기</button>
  </div>
</div>

<div id="popupOverlay">

<!-- ═══════════════════════════════════════════════════════════════════
  🔐 FCMON 자동 로그인 모듈 v1.0
  저장: localStorage ('fcmon_session'), 30일, { userId, name, expiresAt } (비번 미저장)
  ═══════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';
  const STORAGE_KEY = 'fcmon_session';
  const SESSION_DAYS = 30;
  
  window.saveAutoLoginSession = function(userId, name) {
    if (!userId || !name) return;
    try {
      const expiresAt = Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ userId: userId, name: name, expiresAt: expiresAt }));
    } catch (err) { console.warn('[AutoLogin] 세션 저장 실패:', err); }
  };
  
  window.loadAutoLoginSession = function() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const session = JSON.parse(raw);
      if (!session.expiresAt || Date.now() > session.expiresAt) { clearAutoLoginSession(); return null; }
      if (!session.userId || !session.name) { clearAutoLoginSession(); return null; }
      return { userId: session.userId, name: session.name };
    } catch (err) { console.warn('[AutoLogin] 세션 복원 실패:', err); clearAutoLoginSession(); return null; }
  };
  
  window.clearAutoLoginSession = function() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (err) { console.warn('[AutoLogin] 세션 삭제 실패:', err); }
  };
})();
</script>

<script>
  // ★ Firebase 초기화
        
  /* ═══════════════════════ 🔐 마스터 비밀번호 인증 시스템 ═══════════════════════ */
  /* Firestore의 settings/system 문서에 저장된 masterPwHash(SHA-256)와 비교      */
  /* 평문 마스터 비번이 HTML 소스에 노출되지 않도록 함                             */
  let _cachedMasterHash = null; // 세션 내 캐싱 (매번 DB 호출 방지)

  async function sha256(text) {
    const buf = new TextEncoder().encode(text);
    const hashBuf = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function verifyMasterPw(pw) {
    if (!pw) return false;
    try {
      if (!_cachedMasterHash) {
        const doc = await db.collection("settings").doc("system").get();
        if (!doc.exists || !doc.data().masterPwHash) {
          console.warn('[Auth] masterPwHash가 설정되지 않았습니다.');
          return false;
        }
        _cachedMasterHash = doc.data().masterPwHash;
      }
      const inputHash = await sha256(pw);
      return inputHash === _cachedMasterHash;
    } catch (err) {
      console.error('[Auth] 인증 확인 중 오류:', err);
      return false;
    }
  }

  async function makeUserPwHash(pw) {
    return sha256('user:' + pw);
  }

  async function callAuthFunction(name, payload) {
    const res = await fetch(AUTH_FUNCTIONS_BASE_URL + '/' + name, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) return { ok: false, status: res.status, error: data.error || ('auth-function-' + res.status) };
    return data;
  }

  async function verifyUserPw(pw, userData, userId) {
    if (!pw || !userData) return false;
    try {
      const result = await callAuthFunction('verifyUserPassword', { userId: userId || userData.id || '', name: userData.name || '', pw: pw });
      if (result && result.ok) {
        if (result.user) Object.assign(userData, result.user);
        return true;
      }
    } catch (err) {
      console.warn('[Auth] 서버 회원 인증 실패, 로컬 호환 검증으로 전환:', err);
    }
    if (userData.passwordHash) return await makeUserPwHash(pw) === userData.passwordHash;
    return userData.password === pw;
  }

  async function migrateUserPwIfLegacy(userRef, pw, userData) {
    if (!userRef || !pw || !userData || userData.passwordHash || userData.password !== pw) return;
    try {
      const passwordHash = await makeUserPwHash(pw);
      await userRef.update({ password: '0000', passwordHash: passwordHash });
      userData.password = '0000';
      userData.passwordHash = passwordHash;
    } catch (err) {
      console.warn('[Auth] 회원 비밀번호 마이그레이션 실패:', err);
    }
  }

  async function updateUserPasswordClientFallback(userId, currentPw, newPw) {
    const userRef = db.collection("users").doc(userId);
    const userSnap = await userRef.get();
    if (!userSnap.exists) return { ok: false, status: 404, error: 'user-not-found' };

    const userData = { id: userSnap.id, ...userSnap.data() };
    const hasPublicAuthFields = ('password' in userData) || ('passwordHash' in userData);
    if (!hasPublicAuthFields) {
      return { ok: false, status: 503, error: 'server-function-required' };
    }

    const currentOk = await verifyUserPw(currentPw, userData, userId);
    if (!currentOk) return { ok: false, status: 403, error: 'forbidden' };

    const passwordHash = await makeUserPwHash(newPw);
    await userRef.update({ password: '0000', passwordHash: passwordHash });
    return { ok: true, fallback: true, passwordHash: passwordHash };
  }
  /* ═════════════════════════════════════════════════════════════════════════════ */

  /* ═══════════════════════ 🛡 XSS 방어 헬퍼 ═══════════════════════════════════ */
  

  
  /* ═════════════════════════════════════════════════════════════════════════════ */

  /* ═══════════════════════ 🌀 로딩 상태 유틸 ═══════════════════════════════════ */
  function setButtonLoading(btn, isLoading, loadingText) {
    if (!btn) return;
    if (isLoading) {
      if (!btn.dataset.originalText) {
        btn.dataset.originalText = btn.textContent;
      }
      btn.textContent = loadingText || '처리 중...';
      btn.disabled = true;
      btn.classList.add('btn-loading');
    } else {
      if (btn.dataset.originalText) {
        btn.textContent = btn.dataset.originalText;
        delete btn.dataset.originalText;
      }
      btn.disabled = false;
      btn.classList.remove('btn-loading');
    }
  }
  /* ═════════════════════════════════════════════════════════════════════════════ */

  let myChart = null;
  let currentPos = 'MF';
  let isSubmitting = false;
  window._profileLoadedByMaster = false;

  window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('tab') === 'reg') switchTab('reg');
    loadSettingsRealtime();
    applyAutoLoginUI(); // 자동 로그인 세션 상태 반영
  };

  /* ── 팝업 공지 연동 ── */
  function loadSettingsRealtime() {
    db.collection("settings").doc("system").onSnapshot((doc) => {
      if (doc.exists && doc.data().popup && doc.data().popup.text) {
        const popup = doc.data().popup;
        const now = new Date();
        const exp = popup.expireDate ? new Date(popup.expireDate + 'T23:59:59') : null;
        if (!exp || now <= exp) {
          const key = 'fcmon_popup_' + (popup.createdAt || '').replace(/[^a-zA-Z0-9]/g, '');
          if (localStorage.getItem(key) !== 'dismissed') {
            document.getElementById('popupContent').textContent = popup.text;
            document.getElementById('popupExpire').textContent = popup.expireDate ? '게시 기한: ' + popup.expireDate + '까지' : '';
            document.getElementById('popupOverlay').style.display = 'flex';
            window._popupKey = key;
          }
        }
      }
    }, (err) => { console.error('[settings onSnapshot]', err); });
  }
  function dismissPopup(){ if(window._popupKey) localStorage.setItem(window._popupKey, 'dismissed'); document.getElementById('popupOverlay').style.display='none'; }

  function goBack() { window.location.href = 'index.html'; }

  /* ── 탭 전환 ── */
  /* ═══════════════════════ 🎛 능력치 섹션 접기/펼치기 ═══════════════════════ */
  // 기본 접힘, 기존 선수 불러오기 시에만 자동 펼침
  function toggleStatSection(forceOpen) {
    const trigger = document.getElementById('statCollapseTrigger');
    const body = document.getElementById('statCollapseBody');
    if (!trigger || !body) return;
    
    const isOpen = (forceOpen === true) || (forceOpen === false ? false : !trigger.classList.contains('is-open'));
    trigger.classList.toggle('is-open', isOpen);
    body.classList.toggle('is-open', isOpen);
  }
  /* ═════════════════════════════════════════════════════════════════════════════ */

  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabReg').classList.toggle('active', tab === 'reg');
    document.getElementById('loginView').classList.toggle('show', tab === 'login');
    document.getElementById('regView').classList.toggle('show', tab === 'reg');
    
    // 등록/수정 탭으로 전환 시: 기존 선수가 아니면 스탯 섹션 접기 (인지 부하 감소)
    if (tab === 'reg' && !window._profileCache) {
      toggleStatSection(false);
      
      // 자동 로그인 세션이 있으면 이름 자동 입력 (편의)
      const session = window.loadAutoLoginSession();
      const rNameEl = document.getElementById('r_name');
      if (session && rNameEl && !rNameEl.value) {
        rNameEl.value = session.name;
      }
    }
    
    // 로그인 탭으로 돌아올 때 자동 로그인 UI 재적용
    if (tab === 'login') {
      applyAutoLoginUI();
    }
  }

  /* ════════════════════════ 내 기록 조회 탭 (Firebase) ════════════════════════ */
  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    
    // ════════ 자동 로그인 세션 활용 분기 ════════
    const session = window.loadAutoLoginSession();
    const banner = document.getElementById('autoLoginBanner');
    const isAutoLoginActive = session && banner && banner.style.display !== 'none';
    
    if (isAutoLoginActive) {
      setButtonLoading(btn, true, '조회 중...');
      try {
        const userDoc = await db.collection("users").doc(session.userId).get();
        if (!userDoc.exists) {
          window.clearAutoLoginSession();
          showToast('계정을 찾을 수 없습니다. 다시 로그인해주세요.', 'error');
          switchToManualLogin();
          setButtonLoading(btn, false);
          return;
        }
        const matchedUser = { id: userDoc.id, ...userDoc.data() };
        window._profileLoadedByMaster = false;
        showProfile(matchedUser);
        setButtonLoading(btn, false);
      } catch (err) {
        showToast("DB 연결 오류: " + err.message, 'error');
        setButtonLoading(btn, false);
      }
      return;
    }
    
    // ════════ 수동 로그인 (기존 플로우) ════════
    const n = document.getElementById('l_name').value.trim();
    const pw = document.getElementById('l_pw').value.trim();
    if (!n || !pw) { showToast('이름과 비밀번호를 모두 입력해주세요.', 'warning'); return; }
    
    setButtonLoading(btn, true, '조회 중...');
    
    // "로그인 유지" 체크박스 상태
    const rememberMe = document.getElementById('rememberMe');
    const shouldRemember = rememberMe ? rememberMe.checked : false;

    // 마스터 비번 여부 선판정 (forEach 내부에서 await 불가)
    const isMaster = await verifyMasterPw(pw);

    db.collection("users").where("name", "==", n).get().then(async (snapshot) => {
      let matchedUser = null; let matchedRef = null; let shouldMigrateUserPw = false;
      for (const doc of snapshot.docs) {
        const data = doc.data();
        const userPwOk = await verifyUserPw(pw, data, doc.id);
        if (userPwOk || isMaster) {
          matchedUser = { id: doc.id, ...data };
          matchedRef = doc.ref;
          shouldMigrateUserPw = userPwOk && !data.passwordHash;
        }
      }

      if (matchedUser) {
        if (shouldMigrateUserPw) await migrateUserPwIfLegacy(matchedRef, pw, matchedUser);
        window._profileLoadedByMaster = isMaster;
        // 로그인 성공 + "유지" 체크되어 있으면 세션 저장 (마스터 비번일 땐 저장 안 함)
        if (shouldRemember && !isMaster) {
          window.saveAutoLoginSession(matchedUser.id, matchedUser.name);
        }
        showProfile(matchedUser);
      } else {
        showToast("이름이 없거나 비밀번호가 일치하지 않습니다.", 'error');
      }
      setButtonLoading(btn, false);
    }).catch(err => {
      showToast("DB 연결 오류: " + err.message, 'error');
      setButtonLoading(btn, false);
    });
  }
  
  /* ════════ 자동 로그인 UI 제어 ════════ */
  function applyAutoLoginUI() {
    const session = window.loadAutoLoginSession();
    const banner = document.getElementById('autoLoginBanner');
    const manualForm = document.getElementById('manualLoginForm');
    const btn = document.getElementById('loginBtn');
    if (!banner || !manualForm) return;
    
    if (session) {
      document.getElementById('autoLoginName').textContent = session.name + ' 님';
      banner.style.display = 'block';
      manualForm.style.display = 'none';
      if (btn && !btn.classList.contains('btn-loading')) {
        btn.textContent = '📊 바로 조회하기';
      }
    } else {
      banner.style.display = 'none';
      manualForm.style.display = 'block';
      if (btn && !btn.classList.contains('btn-loading')) {
        btn.textContent = '조회하기';
      }
    }
  }
  
  function switchToManualLogin() {
    window.clearAutoLoginSession();
    document.getElementById('autoLoginBanner').style.display = 'none';
    document.getElementById('manualLoginForm').style.display = 'block';
    const nameEl = document.getElementById('l_name');
    const pwEl = document.getElementById('l_pw');
    if (nameEl) nameEl.value = '';
    if (pwEl) pwEl.value = '';
    const btn = document.getElementById('loginBtn');
    if (btn) btn.textContent = '조회하기';
    if (nameEl) nameEl.focus();
  }

  function showProfile(data) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('profileBox').style.display = 'block';
    const safeUrl = safePhotoUrl(data.photoUrl);
    document.getElementById('pAvatar').innerHTML = safeUrl ? '<img src="' + escapeHtml(safeUrl) + '">' : '<img src="./sublogo2.png" style="padding:12px; object-fit:contain;">';
    document.getElementById('pName').textContent = data.name;
    
    const posEl = document.getElementById('pPos');
    const posKo = { FW:'공격수', MF:'미드필더', DF:'수비수', GK:'골키퍼' };
    posEl.className = 'p-pos ' + (data.pos || 'MF');
    posEl.textContent = (data.pos || 'MF') + ' (' + (posKo[data.pos || 'MF']) + ')';
    
    document.getElementById('pOvr').textContent = data.ovr || 50;
    document.getElementById('pScore').textContent = data.rankScore || 0;
    
    const awards = data.awards || { mom: 0, sec: 0, third: 0 };
    document.getElementById('tMom').textContent = awards.mom + '회';
    document.getElementById('tSec').textContent = awards.sec + '회';
    document.getElementById('tThird').textContent = awards.third + '회';

    const stats = data.stats || [50,50,50,50,50,50,50,50];

    Chart.defaults.color = '#8a9e8c';
    Chart.defaults.font.family = "'Noto Sans KR', sans-serif";
    if (myChart) myChart.destroy();
    myChart = new Chart(document.getElementById('radarChart').getContext('2d'), {
      type: 'radar',
      data: {
        labels: ['속도','슈팅','패스','드리블','수비','피지컬','체력','민첩성'],
        datasets: [{ label: '스탯', data: stats, backgroundColor: 'rgba(0,230,118,0.2)', borderColor: '#00E676', borderWidth: 2, pointBackgroundColor: '#00E676' }]
      },
      options: {
        scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.08)' }, pointLabels: { font: { size: 11, weight: 'bold' }, color: '#8a9e8c' } } },
        plugins: { legend: { display: false } }
      }
    });

    document.getElementById('r_name').value = data.name;
    window._profileCache = data;
    resetPasswordChangeBox();
  }

  function resetPasswordChangeBox() {
    const box = document.getElementById('passwordChangeBox');
    if (box) box.style.display = 'none';
    ['pw_current', 'pw_new', 'pw_confirm'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
  }

  function togglePasswordChange() {
    const box = document.getElementById('passwordChangeBox');
    if (!box) return;
    const willShow = box.style.display === 'none' || !box.style.display;
    box.style.display = willShow ? 'block' : 'none';
    if (willShow) {
      const current = document.getElementById('pw_current');
      if (current) current.focus();
    }
  }

  async function updateMyPassword() {
    if (!window._profileCache || !window._profileCache.id) {
      showToast('먼저 내 기록을 조회해주세요.', 'warning');
      return;
    }

    const currentPw = document.getElementById('pw_current').value.trim();
    const newPw = document.getElementById('pw_new').value.trim();
    const confirmPw = document.getElementById('pw_confirm').value.trim();

    if (!/^[0-9]{4}$/.test(currentPw) || !/^[0-9]{4}$/.test(newPw) || !/^[0-9]{4}$/.test(confirmPw)) {
      showToast('비밀번호는 숫자 4자리로 입력해주세요.', 'warning');
      return;
    }
    if (newPw !== confirmPw) {
      showToast('새 비밀번호 확인이 일치하지 않습니다.', 'error');
      return;
    }
    if (currentPw === newPw) {
      showToast('현재 비밀번호와 다른 번호를 입력해주세요.', 'warning');
      return;
    }

    const btn = document.getElementById('pwChangeBtn');
    setButtonLoading(btn, true, '변경 중...');
    try {
      let result;
      try {
        result = await callAuthFunction('updateUserPassword', {
          userId: window._profileCache.id,
          currentPw: currentPw,
          newPw: newPw
        });
      } catch (err) {
        console.warn('[Auth] 비밀번호 변경 함수 호출 실패, 클라이언트 호환 처리 시도:', err);
        result = await updateUserPasswordClientFallback(window._profileCache.id, currentPw, newPw);
      }
      if (!result || (!result.ok && (result.status === 404 || result.status === 503 || /auth-function-404|server-function-required/i.test(result.error || '')))) {
        result = await updateUserPasswordClientFallback(window._profileCache.id, currentPw, newPw);
      }
      if (!result || !result.ok) {
        if (result && result.status === 403) {
          showToast('현재 비밀번호가 일치하지 않습니다.', 'error');
        } else if (result && result.error === 'server-function-required') {
          showToast('비밀번호 변경 함수 배포가 필요합니다.', 'error');
        } else {
          showToast('비밀번호 변경 실패: ' + ((result && result.error) || 'unknown'), 'error');
        }
        return;
      }

      delete window._profileCache.password;
      if (result.fallback) {
        window._profileCache.password = '0000';
        window._profileCache.passwordHash = result.passwordHash;
      } else {
        delete window._profileCache.passwordHash;
      }
      if (document.getElementById('l_pw')) document.getElementById('l_pw').value = newPw;
      if (document.getElementById('r_pw')) document.getElementById('r_pw').value = newPw;
      resetPasswordChangeBox();
      showToast('비밀번호가 변경되었습니다.', 'success');
    } catch (err) {
      const msg = err && err.message ? err.message : 'network';
      if (/load failed|failed to fetch|network/i.test(msg)) {
        showToast('Firebase 함수 연결 실패: functions 배포/권한을 확인해주세요.', 'error');
      } else {
        showToast('변경 실패: ' + msg, 'error');
      }
    } finally {
      setButtonLoading(btn, false);
    }
  }

  function resetLoginView() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('profileBox').style.display = 'none';
    document.getElementById('l_name').value = '';
    document.getElementById('l_pw').value = '';
    window._profileCache = null;
    window._profileLoadedByMaster = false;
    resetPasswordChangeBox();
    applyAutoLoginUI(); // 자동 로그인 배너 다시 적용
  }

  function goToEditFromProfile() {
    if (window._profileCache) {
      fillRegForm(window._profileCache, document.getElementById('l_pw').value);

    switchTab('reg');
  }

  /* ════════════════════════ 선수 등록/수정 탭 (Firebase) ════════════════════════ */
  async function loadExistingData() {
    const name = document.getElementById('r_name').value.trim();
    const pw   = document.getElementById('r_pw').value.trim();
    if (!name || !pw) { showToast('이름과 비밀번호를 먼저 입력해주세요.', 'warning'); return; }

    const btn = document.getElementById('loadBtn');
    setButtonLoading(btn, true, '불러오는 중...');

    // 마스터 비번 여부 선판정 (forEach 내부에서 await 불가)
    const isMaster = await verifyMasterPw(pw);

    db.collection("users").where("name", "==", name).get().then(async (snapshot) => {
      setButtonLoading(btn, false);
      if (snapshot.empty) {
        showLoadStatus('new', '🆕 신규 선수입니다. 정보를 입력 후 등록해주세요.');
        window._profileCache = null;
        window._profileLoadedByMaster = false;
      } else {
        let matchedUser = null; let matchedRef = null; let shouldMigrateUserPw = false;
        for (const doc of snapshot.docs) {
          const data = doc.data();
          const userPwOk = await verifyUserPw(pw, data, doc.id);
          if (userPwOk || isMaster) {
            matchedUser = { id: doc.id, ...data };
            matchedRef = doc.ref;
            shouldMigrateUserPw = userPwOk && !data.passwordHash;
          }
        }

        if (matchedUser) {
          if (shouldMigrateUserPw) await migrateUserPwIfLegacy(matchedRef, pw, matchedUser);
          window._profileCache = matchedUser;
          window._profileLoadedByMaster = isMaster;
          fillRegForm(matchedUser, pw);
          showLoadStatus('success', '✅ 기존 정보를 불러왔습니다. 수정 후 저장하세요.');
        } else {
          window._profileLoadedByMaster = false;
          showLoadStatus('new', '⚠️ 비밀번호가 일치하지 않습니다.');
        }
      }
    }).catch(err => {
      setButtonLoading(btn, false);
      showLoadStatus('new', '⚠️ DB 연결 오류가 발생했습니다.');
    });
  }

  function showLoadStatus(type, msg) {
    const el = document.getElementById('loadStatus');
    el.className = 'load-status ' + type;
    el.textContent = msg;
  }

  function fillRegForm(data, pw) {
    if (pw) document.getElementById('r_pw').value = pw;
    setPos(data.pos || 'MF');
    
    // 연락처 & Instagram (기존 값 채우기)
    const contactEl = document.getElementById('r_contact');
    const instagramEl = document.getElementById('r_instagram');
    if (contactEl) contactEl.value = data.contact || '';
    if (instagramEl) instagramEl.value = data.instagram || '';
    
    // 기존 사진 상태 초기화
    pendingPhotoBlob = null;
    existingPhotoUrl = "";
    
    if (data.photoUrl) {
      const safeUrl = safePhotoUrl(data.photoUrl);
      if (safeUrl) {
        existingPhotoUrl = safeUrl; // 기존 사진 유지 (안전한 URL만)
        document.getElementById('photoPreview').innerHTML = '<img src="' + escapeHtml(safeUrl) + '">';
      }
    } else {
      document.getElementById('photoPreview').innerHTML = '📷';
    }
    
    const ids = ['speed','shoot','pass','drib','def','phys','stamina','agility'];
    if (data.stats && data.stats.length === 8) {
      ids.forEach(function(id, i) {
        document.getElementById('s_' + id).value = data.stats[i];
        document.getElementById('v_' + id).textContent = data.stats[i];
      });
    }
    calcOVR();
    
    // 기존 선수는 스탯 수정 가능성이 높으므로 자동으로 펼침
    toggleStatSection(true);
  }

  /* ── 포지션 선택 ── */
  function setPos(pos) {
    currentPos = pos;
    ['FW','MF','DF','GK'].forEach(function(p) {
      const btn = document.getElementById('pos-' + p);
      btn.className = 'pos-btn' + (p === pos ? ' active-' + p : '');
    });
  }

  /* ── OVR 계산 ── */
  function calcOVR() {
    const ids = ['speed','shoot','pass','drib','def','phys','stamina','agility'];
    let total = 0;
    ids.forEach(function(id) {
      let val = parseInt(document.getElementById('s_' + id).value);
      document.getElementById('v_' + id).textContent = val;
      total += val;
    });
    document.getElementById('r_ovrTotal').textContent = Math.round(total / 8);
  }

  /* ── 사진 미리보기 & Base64 압축 (Firebase Storage 없이 직접 저장) ── */
  // ─── 사진 상태 관리 ──────────────────────────────────────
  // pendingPhotoBlob: 사용자가 선택한 새 사진 (업로드 대기)
  // existingPhotoUrl: 기존 저장된 URL (수정 모드에서 그대로 유지할 때 사용)
  let pendingPhotoBlob = null;
  let existingPhotoUrl = "";

  function previewPhoto(input) {
    const file = input.files[0]; 
    if (!file) return;
    
    // 파일 크기 사전 체크 (Storage rules에서 2MB 제한)
    if (file.size > 10 * 1024 * 1024) {
      showToast('사진이 너무 큽니다. 10MB 이하로 선택해주세요.', 'warning');
      return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) { 
      const img = new Image();
      img.src = e.target.result;
      img.onload = function() {
        // 400x400으로 리사이징 (기존 200x200에서 개선)
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 400;
        ctx.drawImage(img, 0, 0, 400, 400);
        
        // Canvas → Blob 변환 (Storage 업로드용)
        canvas.toBlob(function(blob) {
          pendingPhotoBlob = blob;
          // 미리보기는 Data URL 사용 (저장 전이라 Storage URL 아직 없음)
          const previewUrl = canvas.toDataURL('image/jpeg', 0.85);
          document.getElementById('photoPreview').innerHTML = '<img src="' + escapeHtml(previewUrl) + '">';
        }, 'image/jpeg', 0.85);
      };
    };
    reader.readAsDataURL(file);
  }
  
  // ─── Firebase Storage 업로드 ─────────────────────────────
  // 선수 사진을 users/{userId}/profile.jpg 경로에 업로드하고 다운로드 URL 반환
  async function uploadPhotoToStorage(userId, blob) {
    const storage = firebase.storage();
    const ref = storage.ref('users/' + userId + '/profile.jpg');
    // 메타데이터: Cache-Control로 장시간 캐싱 (사진 교체 시 URL에 토큰 바뀌므로 OK)
    const metadata = { contentType: 'image/jpeg', cacheControl: 'public, max-age=86400' };
    const snap = await ref.put(blob, metadata);
    return await snap.ref.getDownloadURL();
  }

  /* ── 등록 / 수정 DB 저장 ── */
  async function submitReg() {
    if (isSubmitting) return;
    const name = document.getElementById('r_name').value.trim();
    const pw   = document.getElementById('r_pw').value.trim();
    if (!name || !pw) { showToast('이름과 비밀번호를 입력해주세요.', 'warning'); return; }
    
    isSubmitting = true;
    const btn = document.getElementById('regSubmitBtn'); 
    setButtonLoading(btn, true, '처리 중...');

    const statsArray = [
      parseInt(document.getElementById('s_speed').value),
      parseInt(document.getElementById('s_shoot').value),
      parseInt(document.getElementById('s_pass').value),
      parseInt(document.getElementById('s_drib').value),
      parseInt(document.getElementById('s_def').value),
      parseInt(document.getElementById('s_phys').value),
      parseInt(document.getElementById('s_stamina').value),
      parseInt(document.getElementById('s_agility').value)
    ];
    
    const ovrVal = parseInt(document.getElementById('r_ovrTotal').textContent);
    
    // 연락처 & Instagram (선택 입력)
    const contactRaw = (document.getElementById('r_contact').value || '').trim();
    const instagramRaw = (document.getElementById('r_instagram').value || '').trim().replace(/^@/, '');

    const payload = {
      name: name,
      pos: currentPos,
      ovr: ovrVal,
      stats: statsArray,
      contact: contactRaw.substring(0, 50),
      instagram: instagramRaw.substring(0, 50),
      // photoUrl은 Storage 업로드 후 아래에서 주입
    };

    const isExistingProfile = !!(window._profileCache && window._profileCache.id);
    const hasPublicAuthFields = !!(window._profileCache && ('password' in window._profileCache || 'passwordHash' in window._profileCache));
    if (!isExistingProfile) {
      payload.password = '0000';
      payload.passwordHash = await makeUserPwHash(pw);
    } else if (window._profileLoadedByMaster && await verifyMasterPw(pw)) {
      if (hasPublicAuthFields) {
        payload.password = window._profileCache.password || '0000';
        if (window._profileCache.passwordHash) payload.passwordHash = window._profileCache.passwordHash;
      }
    } else if (hasPublicAuthFields) {
      payload.password = '0000';
      payload.passwordHash = await makeUserPwHash(pw);
    }

    try {
      if (window._profileCache && window._profileCache.id) {
        // ═══ 기존 유저 업데이트 ═══
        const userId = window._profileCache.id;
        
        // 사진 처리 분기:
        //   1) 새 사진 선택됨 → Storage 업로드 → URL 저장
        //   2) 기존 사진 유지 → existingPhotoUrl 그대로 사용 (Storage URL이든 Base64든)
        //   3) 사진 없음 → 빈 문자열
        if (pendingPhotoBlob) {
          setButtonLoading(btn, true, '사진 업로드 중...');
          payload.photoUrl = await uploadPhotoToStorage(userId, pendingPhotoBlob);
        } else {
          payload.photoUrl = existingPhotoUrl || '';
        }
        
        setButtonLoading(btn, true, '저장 중...');
        await db.collection("users").doc(userId).update(payload);
        finishSubmit(name, pw, "정보가 성공적으로 수정되었습니다.");
        
      } else {
        // ═══ 신규 유저 생성 ═══
        // 신규는 먼저 문서 ID 확보 후 Storage 업로드 (userId가 Storage 경로에 필요)
        
        // 이름 중복 체크
        const snap = await db.collection("users").where("name", "==", name).get();
        if (!snap.empty) {
          showToast("이미 존재하는 이름입니다. 기존 선수라면 [불러오기]를 해주세요.", 'warning');
          setButtonLoading(btn, false);
          isSubmitting = false;
          return;
        }
        
        // 기본값 세팅
        payload.rankScore = 0;
        payload.awards = { mom: 0, sec: 0, third: 0 };
        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        payload.photoUrl = ''; // 일단 빈값으로 생성
        
        setButtonLoading(btn, true, '선수 등록 중...');
        const docRef = await db.collection("users").add(payload);
        
        // 사진 있으면 업로드 후 photoUrl 업데이트
        if (pendingPhotoBlob) {
          setButtonLoading(btn, true, '사진 업로드 중...');
          try {
            const photoUrl = await uploadPhotoToStorage(docRef.id, pendingPhotoBlob);
            await db.collection("users").doc(docRef.id).update({ photoUrl: photoUrl });
          } catch (photoErr) {
            // 사진 업로드 실패해도 선수 등록은 성공 상태로 마무리
            console.warn('사진 업로드 실패 (선수 등록은 성공):', photoErr);
            showToast('⚠️ 선수 등록은 완료되었지만 사진 업로드에 실패했습니다. 다시 시도해주세요.', 'warning');
          }
        }
        
        finishSubmit(name, pw, "선수 등록이 완료되었습니다!");
      }
    } catch (err) {
      failSubmit(err);
    }
  }

  function finishSubmit(name, pw, msg) {
    showToast(msg, 'success');
    isSubmitting = false; 
    const btn = document.getElementById('regSubmitBtn');
    setButtonLoading(btn, false);
    
    // 등록/수정 성공 시 자동 로그인 세션 갱신 (이름 변경도 반영)
    // 단, 현재 자동 로그인 중인 유저의 수정일 때만 갱신
    const existingSession = window.loadAutoLoginSession();
    if (window._profileCache && window._profileCache.id && existingSession && existingSession.userId === window._profileCache.id) {
      window.saveAutoLoginSession(window._profileCache.id, name);
    }
    
    // 저장 성공 후 바로 로그인 화면으로 넘어가 프로필 보여주기
    document.getElementById('l_name').value = name;
    document.getElementById('l_pw').value = pw;
    switchTab('login');
    doLogin(); 
  }

  function failSubmit(err) {
    showToast('DB 오류: ' + err.message, 'error'); 
    isSubmitting = false; 
    const btn = document.getElementById('regSubmitBtn');
    setButtonLoading(btn, false);
  }

/* ★ PC 환경 고급 UX: 엔터 및 ESC 키 감지 시스템 ★ */
  document.addEventListener('keydown', function(e) {
    // 1. ESC 키를 누르면 열려있는 모든 팝업창 닫기
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-bg.show, .chart-modal-bg.show').forEach(function(el) {
        el.classList.remove('show');
      });
      // 공지사항 팝업이 열려있다면 닫기
      const popupOverlay = document.getElementById('popupOverlay');
      if (popupOverlay && popupOverlay.style.display !== 'none') {
        dismissPopup();
      }
    }
    
    // 2. 공지사항 팝업이 열려있을 때 '엔터'를 누르면 확인 버튼 효과
    if (e.key === 'Enter') {
      const popupOverlay = document.getElementById('popupOverlay');
      if (popupOverlay && popupOverlay.style.display !== 'none') {
        dismissPopup();
      }
    }
  });

</script>

사용 예:

  if (await showConfirm('삭제할까요?', { danger: true })) { ... }

<!-- ═══════════════════════ JS ═══════════════════════ -->
<script>
(function(){
  /* 🔔 토스트 */
  function ensureToastContainer() {
    let c = document.getElementById('fcm-toast-container');
    if (!c) {
      c = document.createElement('div');
      c.id = 'fcm-toast-container';
      document.body.appendChild(c);
    }
    return c;
  }
  
  window.showToast = function(message, type) {
    const container = ensureToastContainer();
    const el = document.createElement('div');
    el.className = 'fcm-toast fcm-toast-' + (type || 'info');
    el.textContent = message;
    container.appendChild(el);
    
    // 자동 제거
    const duration = (type === 'error' || type === 'warning') ? 3800 : 2800;
    setTimeout(function(){
      el.classList.add('is-leaving');
      setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 200);
    }, duration);
  };
  
  /* 🔧 다이얼로그 공통 DOM 구성 */
  function ensureDialogOverlay() {
    let ov = document.getElementById('fcm-dialog-overlay');
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'fcm-dialog-overlay';
      ov.innerHTML = '<div class="fcm-dialog-box">' +
        '<div class="fcm-dialog-title" id="fcm-dialog-title"></div>' +
        '<div class="fcm-dialog-message" id="fcm-dialog-message"></div>' +
        '<input type="text" class="fcm-dialog-input" id="fcm-dialog-input" style="display:none;">' +
        '<div class="fcm-dialog-actions">' +
          '<button type="button" class="fcm-dialog-btn fcm-dialog-btn-cancel" id="fcm-dialog-cancel"></button>' +
          '<button type="button" class="fcm-dialog-btn fcm-dialog-btn-confirm" id="fcm-dialog-confirm"></button>' +
        '</div></div>';
      document.body.appendChild(ov);
    }
    return ov;
  }
  
  let dialogResolver = null;
  
  function closeDialog(result) {
    const ov = document.getElementById('fcm-dialog-overlay');
    if (ov) ov.classList.remove('is-open');
    if (dialogResolver) {
      const r = dialogResolver;
      dialogResolver = null;
      r(result);
    }
  }
  
  /* ✅ showConfirm - Promise<boolean> */
  window.showConfirm = function(message, opts) {
    opts = opts || {};
    const ov = ensureDialogOverlay();
    const titleEl = document.getElementById('fcm-dialog-title');
    const messageEl = document.getElementById('fcm-dialog-message');
    const inputEl = document.getElementById('fcm-dialog-input');
    const cancelBtn = document.getElementById('fcm-dialog-cancel');
    const confirmBtn = document.getElementById('fcm-dialog-confirm');
    
    titleEl.textContent = opts.title || '확인';
    titleEl.classList.toggle('is-danger', !!opts.danger);
    messageEl.textContent = message;
    messageEl.style.display = '';
    inputEl.style.display = 'none';
    
    cancelBtn.textContent = opts.cancelText || '취소';
    cancelBtn.style.display = '';
    confirmBtn.textContent = opts.confirmText || '확인';
    confirmBtn.classList.toggle('is-danger', !!opts.danger);
    
    cancelBtn.onclick = function(){ closeDialog(false); };
    confirmBtn.onclick = function(){ closeDialog(true); };
    
    ov.classList.add('is-open');
    confirmBtn.focus();
    
    return new Promise(function(resolve){ dialogResolver = resolve; });
  };
  
  /* 📝 showPrompt - Promise<string|null> */
  window.showPrompt = function(message, opts) {
    opts = opts || {};
    const ov = ensureDialogOverlay();
    const titleEl = document.getElementById('fcm-dialog-title');
    const messageEl = document.getElementById('fcm-dialog-message');
    const inputEl = document.getElementById('fcm-dialog-input');
    const cancelBtn = document.getElementById('fcm-dialog-cancel');
    const confirmBtn = document.getElementById('fcm-dialog-confirm');
    
    titleEl.textContent = opts.title || '입력';
    titleEl.classList.remove('is-danger');
    messageEl.textContent = message;
    messageEl.style.display = message ? '' : 'none';
    
    inputEl.style.display = '';
    inputEl.type = opts.type || 'text';
    inputEl.placeholder = opts.placeholder || '';
    inputEl.value = opts.defaultValue || '';
    if (opts.maxlength) inputEl.maxLength = opts.maxlength;
    else inputEl.removeAttribute('maxlength');
    if (opts.type === 'number' || (opts.maxlength === 4 && opts.type === 'password')) {
      inputEl.inputMode = 'numeric';
      inputEl.pattern = '[0-9]*';
    } else {
      inputEl.removeAttribute('inputmode');
      inputEl.removeAttribute('pattern');
    }
    
    cancelBtn.textContent = opts.cancelText || '취소';
    cancelBtn.style.display = '';
    confirmBtn.textContent = opts.confirmText || '확인';
    confirmBtn.classList.remove('is-danger');
    
    cancelBtn.onclick = function(){ closeDialog(null); };
    confirmBtn.onclick = function(){ closeDialog(inputEl.value); };
    inputEl.onkeydown = function(e){ 
      if (e.key === 'Enter') { e.preventDefault(); closeDialog(inputEl.value); }
    };
    
    ov.classList.add('is-open');
    setTimeout(function(){ inputEl.focus(); }, 50);
    
    return new Promise(function(resolve){ dialogResolver = resolve; });
  };
  
  /* ⌨️ 전역 키보드 - ESC로 다이얼로그 취소, 배경 클릭으로 취소 */
  document.addEventListener('keydown', function(e){
    const ov = document.getElementById('fcm-dialog-overlay');
    if (!ov || !ov.classList.contains('is-open')) return;
    if (e.key === 'Escape') { closeDialog(null); }
  });
  
  document.addEventListener('click', function(e){
    const ov = document.getElementById('fcm-dialog-overlay');
    if (!ov || !ov.classList.contains('is-open')) return;
    if (e.target === ov) { closeDialog(null); }
  }, true);
})();
</script>

<script>
(function(){
  /* 🔄 showUndoToast - 실행 취소 가능한 토스트 */
  /* 반환값: { commit: () => void, cancel: () => void } */
  /*   commit(): 즉시 완료(토스트 닫고 완료 콜백 실행 안 함) */
  /*   cancel(): 되돌리기 동작 (토스트 닫고 onUndo 콜백 실행) */
  
  window.showUndoToast = function(message, onUndo, opts) {
    opts = opts || {};
    const duration = opts.duration || 5000;
    const label = opts.label || '되돌리기';
    
    // 컨테이너 확보 (showToast와 공유)
    let container = document.getElementById('fcm-toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'fcm-toast-container';
      document.body.appendChild(container);
    }
    
    const toast = document.createElement('div');
    toast.className = 'fcm-toast fcm-toast-success fcm-undo-toast';
    
    const msgEl = document.createElement('div');
    msgEl.className = 'fcm-undo-message';
    msgEl.textContent = message;
    
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'fcm-undo-btn';
    btn.textContent = label;
    
    const progress = document.createElement('div');
    progress.className = 'fcm-undo-progress';
    progress.style.animationDuration = duration + 'ms';
    
    toast.appendChild(msgEl);
    toast.appendChild(btn);
    toast.appendChild(progress);
    container.appendChild(toast);
    
    let settled = false;
    let timeoutId = null;
    
    function dismiss() {
      if (settled) return;
      settled = true;
      if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
      toast.classList.add('is-leaving');
      setTimeout(function(){ if (toast.parentNode) toast.parentNode.removeChild(toast); }, 200);
    }
    
    btn.onclick = function() {
      if (settled) return;
      try { if (onUndo) onUndo(); } 
      catch(e) { console.error('[Undo] 되돌리기 오류:', e); }
      dismiss();
    };
    
    timeoutId = setTimeout(function() {
      // 자동 소멸 - 되돌리기 호출 없이 그냥 토스트 닫힘
      dismiss();
    }, duration);
    
    return {
      commit: function() { dismiss(); },
      cancel: function() { btn.click(); }
    };
  };
})();
</script>
